server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /privacy {
        try_files /privacy.html =404;
    }

    # Android App Links verification — must be served as application/json
    location = /.well-known/assetlinks.json {
        default_type application/json;
        try_files /.well-known/assetlinks.json =404;
    }

    # APK removed — all downloads go through Play Store
    location = /hayat.apk {
        return 302 https://play.google.com/store/apps/details?id=site.hayatapp;
    }

    # Shared deep links — smart redirect: try app first, fallback to Play Store
    # On Android with app installed: App Links auto-open the app (via assetlinks.json)
    # On Android without app / on iOS / on desktop: show smart redirect page
    location ~ ^/(post|user)/ {
        try_files /open.html =404;
    }
}
