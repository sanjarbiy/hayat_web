server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /privacy {
        try_files /privacy.html =404;
    }

    # APK removed — all downloads go through Play Store
    location = /hayat.apk {
        return 302 https://play.google.com/store/apps/details?id=site.hayatapp;
    }

    # Shared post/user links — redirect to Play Store (app handles deep links via intent filters)
    location ~ ^/(post|user)/ {
        return 302 https://play.google.com/store/apps/details?id=site.hayatapp;
    }
}
