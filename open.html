<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening in Hayat...</title>
    <meta name="theme-color" content="#0A0A0A">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0A;
            color: #F0F0F0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .card { max-width: 380px; width: 100%; }
        .logo {
            width: 64px; height: 64px; border-radius: 16px;
            background: linear-gradient(135deg, #2E5BFF, #D4A855);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; font-size: 28px; font-weight: 800; color: #fff;
        }
        h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        p { font-size: 14px; color: #888; margin-bottom: 24px; line-height: 1.5; }
        .spinner {
            width: 24px; height: 24px;
            border: 2.5px solid #333; border-top-color: #2E5BFF;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn {
            display: inline-block; padding: 12px 32px;
            background: #2E5BFF; color: #fff; font-size: 15px; font-weight: 600;
            border-radius: 999px; text-decoration: none; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .sub { font-size: 12px; color: #555; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">H</div>
        <div class="spinner" id="spinner"></div>
        <h1>Opening in Hayat...</h1>
        <p id="msg">Redirecting you to the app</p>
        <a id="fallback" class="btn" style="display:none"
           href="https://play.google.com/store/apps/details?id=site.hayatapp">
            Get Hayat on Google Play
        </a>
        <p class="sub" id="sub"></p>
    </div>
    <script>
        (function() {
            // Sanitize path: only allow /post/{id} or /user/{username}
            // IDs/usernames must be alphanumeric + underscore + hyphen only
            var match = window.location.pathname.match(/^\/(post|user)\/([a-zA-Z0-9_-]+)\/?$/);
            if (!match) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('msg').textContent = 'Invalid link';
                return;
            }

            var type = match[1];
            var id = match[2];
            var safePath = '/' + type + '/' + id;
            var playUrl = 'https://play.google.com/store/apps/details?id=site.hayatapp';
            var intentUrl = 'intent://hayatapp.site' + safePath +
                '#Intent;scheme=https;package=site.hayatapp;S.browser_fallback_url=' +
                encodeURIComponent(playUrl) + ';end';

            var start = Date.now();
            window.location.href = intentUrl;

            // If still here after 1.5s, app didn't open
            setTimeout(function() {
                if (Date.now() - start < 3000) {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('msg').textContent = 'Hayat app is not installed';
                    document.getElementById('fallback').style.display = 'inline-block';
                    document.getElementById('sub').textContent = 'Install from Google Play to view this content';
                }
            }, 1500);
        })();
    </script>
</body>
</html>
